<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Items</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Items</h1>
  <div id="items"></div>
  <script>
    fetch('/api/items')
      .then((response) => response.json())
      .then((data) => {
        const container = document.getElementById('items');
        container.innerHTML = data.map(item => `<p>${item.name}: ${item.description}</p>`).join('');
      });
  </script>
</body>
</html>
